# [MANAGED] coverage
[tool.coverage.report]
fail_under = 15
precision = 2
show_missing = true
skip_covered = false

[tool.coverage.run]
omit = [
  "*/dependency_injector/providers.pyx",
]

# [MANAGED] deptry
[tool.deptry]
known_first_party = [
  "flext_web",
]
pep621_dev_dependency_groups = [
  "dev",
]

[tool.hatch.metadata]
allow-direct-references = true

# [MANAGED] mypy
[tool.mypy]
disable_error_code = [
  "name-defined",
  "prop-decorator",
]
explicit_package_bases = true
ignore_missing_imports = true
mypy_path = [ ".", "../typings", "../typings/generated", "src" ]
namespace_packages = true
plugins = [
  "pydantic.mypy",
]
python_version = "3.13"

[tool.poetry]

# [MANAGED] pydantic-mypy
[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

# [MANAGED] pyrefly
[tool.pyrefly]
disable-project-excludes-heuristics = true
ignore-errors-in-generated-code = true
project-excludes = [
  "**/*_pb2*.py",
  "**/*_pb2_grpc*.py",
  "**/.venv/**",
  "**/__pycache__",
  "**/node_modules",
  "**/typings/**",
  "**/vendor/**",
  "**/venv/**",
  ".flext-deps/**",
  ".venv/**",
  "typings/**",
  "vendor/**",
]
project-includes = [
  "examples/**/*.py*",
  "src/**/*.py*",
  "tests/**/*.py*",
]
python-version = "3.13"
search-path = [
  ".",
  "../flext-cli/examples",
  "../flext-cli/src",
  "../flext-core/examples",
  "../flext-core/src",
  "../flext-infra/src",
  "../flext-tests/src",
  "src",
]
use-ignore-files = false

[tool.pyrefly.errors]

abstract-method-call = false
annotation-mismatch = true
bad-argument-count = true
bad-argument-type = true
bad-assignment = true
bad-class-definition = true
bad-context-manager = true
bad-dunder-all = true
bad-function-definition = true
bad-index = true
bad-instantiation = true
bad-keyword-argument = true
bad-match = true
bad-override = false
bad-param-name-override = true
bad-raise = true
bad-return = true
bad-specialization = true
bad-typed-dict = true
bad-typed-dict-key = true
bad-unpacking = true
deprecated = true
implicit-abstract-class = true
implicit-any = true
implicit-import = true
implicitly-defined-attribute = true
inconsistent-inheritance = true
inconsistent-overload = true
inconsistent-overload-default = true
invalid-annotation = true
invalid-argument = true
invalid-decorator = true
invalid-inheritance = true
invalid-literal = true
invalid-overload = true
invalid-param-spec = true
invalid-pattern = true
invalid-self-type = true
invalid-super-call = true
invalid-type-alias = true
invalid-type-var = true
invalid-type-var-tuple = true
invalid-variance = true
invalid-yield = true
missing-argument = true
missing-attribute = true
missing-import = true
missing-module-attribute = true
missing-override-decorator = true
missing-source = true
missing-source-for-stubs = true
no-access = true
no-matching-overload = true
non-convergent-recursion = false
non-exhaustive-match = false
not-a-type = true
not-async = true
not-callable = true
not-iterable = true
not-required-key-access = true
open-unpacking = true
protocol-implicitly-defined-attribute = true
read-only = true
redefinition = true
redundant-cast = true
redundant-condition = true
unannotated-attribute = true
unannotated-parameter = true
unannotated-return = true
unbound-name = true
unexpected-keyword = true
unexpected-positional-argument = true
unknown-name = true
unnecessary-comparison = true
unreachable = true
unresolvable-dunder-all = true
unsafe-overlap = true
unsupported = true
unsupported-delete = true
unsupported-operation = true
untyped-import = true
unused-coroutine = true
unused-ignore = true
variance-mismatch = true

# [MANAGED] pyright
[tool.pyright]
exclude = [
  "**/.*",
  "**/.venv",
  "**/.venv/**",
  "**/__pycache__",
  "**/dist-packages",
  "**/dist-packages/**",
  "**/node_modules",
  "**/site-packages",
  "**/site-packages/**",
  "**/venv",
  "**/venv/**",
  ".venv",
]
extraPaths = [
  ".",
  "../typings",
  "../typings/generated",
  "src",
]
ignore = [
  "**/*.pyi",
  "../typings",
  "../typings/generated",
]
pythonPlatform = "Linux"
pythonVersion = "3.13"
reportCallIssue = "none"
reportConstantRedefinition = "error"
reportIncompatibleMethodOverride = "error"
reportIncompatibleVariableOverride = "error"
reportInconsistentConstructor = "error"
reportMissingImports = "error"
reportMissingModuleSource = "error"
reportMissingTypeStubs = "warning"
reportPrivateUsage = "warning"
reportUnnecessaryCast = "error"
reportUnnecessaryComparison = "warning"
reportUnnecessaryIsInstance = "warning"
reportUnusedClass = "error"
reportUnusedFunction = "error"
reportUnusedImport = "error"
reportUnusedVariable = "error"
stubPath = "../typings"
typeCheckingMode = "strict"
venv = ".venv"
venvPath = ".."

[[tool.pyright.executionEnvironments]]
extraPaths = [ "src" ]
reportPrivateUsage = "error"
root = "src"

[[tool.pyright.executionEnvironments]]
extraPaths = [ ".", "src" ]
reportPrivateUsage = "none"
root = "tests"

[[tool.pyright.executionEnvironments]]
extraPaths = [ ".", "src" ]
reportPrivateUsage = "none"
root = "examples"

# [MANAGED] pytest
[tool.pytest.ini_options]
addopts = [
  "--strict-markers",
]
markers = [
  "docker: tests requiring Docker",
  "e2e: end-to-end integration tests",
  "edge_cases: edge case tests",
  "integration: integration tests",
  "performance: performance and benchmark tests",
  "resilience: resilience tests",
  "slow: slow-running tests",
  "stress: stress tests",
  "unit: unit tests",
]
minversion = "8.0"
python_classes = [
  "Test*",
]
python_files = [
  "*_test.py",
  "*_tests.py",
  "test_*.py",
]

# [MANAGED] ruff
[tool.ruff]
exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "__pycache__",
  "archive",
  "backup",
  "build",
  "dist",
  "htmlcov",
  "temp-backup",
  "typings",
  "vendor",
  "venv",
]
fix = true
line-length = 88
preview = true
respect-gitignore = true
show-fixes = true
src = [
  "examples",
  "src",
  "tests",
]
target-version = "py313"

[tool.ruff.format]
docstring-code-format = true
indent-style = "space"
line-ending = "lf"
quote-style = "double"

