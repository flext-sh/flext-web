  "B009",
  "B010",
  "B017",
  "BLE001",
  "C901",
  "COM812",
  "CPY001",
  "D203",
  "D213",
  "D401",
  "D417",
  "DOC201",
  "DOC202",
  "DOC402",
  "DOC501",
  "DOC502",
  "E501",
  "ERA001",
  "FBT003",
  "G004",
  "I001",
  "N805",
  "N813",
  "N816",
  "PIE790",
  "PLC0415",
  "PLR0904",
  "PLR0911",
  "PLR0912",
  "PLR0913",
  "PLR0914",
  "PLR0915",
  "PLR0917",
  "PLR1702",
  "PLR6301",
  "PLW0108",
  "PLW2901",
  "PLW3201",
  "PYI042",
  "Q000",
  "RUF001",
