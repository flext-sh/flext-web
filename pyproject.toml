"**/models.py" = [ "PLC2801", "S102", "S105" ]
"**/orchestrator*.py" = [ "S404", "S603" ]
"**/output.py" = [ "FBT001" ]
"**/plugins/*.py" = [ "FBT001", "FBT002", "S404", "S603", "S607", "TID252" ]
"**/protocol_impls/*.py" = [ "SLF001" ]
"**/providers/*.py" = [ "S106", "S107" ]
"**/services/prompts.py" = [ "D102", "D107" ]
"**/settings.py" = [ "ANN401", "FBT001", "SLF001" ]
"**/singer/*.py" = [ "S404", "S603" ]
"**/tools/*.py" = [ "FBT001", "FBT002", "N802", "S404", "S603", "S607", "T201" ]
"**/tools/**/*.py" = [ "FBT001", "FBT002", "N802", "S404", "S603", "S607", "T201" ]
"**/typings.py" = [ "RUF036" ]
"**/workspace/*.py" = [ "S404", "S603", "S607" ]

# [MANAGED] tomlsort

[tool.tomlsort]
all = true
in_place = true
sort_first = [ "build-system", "dependency-groups", "project", "tool" ]

[tool.uv]
required-version = "==0.9.21"


[tool.vulture]
exclude = [ "*/_protocols/*" ]
min_confidence = 100
paths = [ "src" ]
verbose = false

# [MANAGED] yamlfix

[tool.yamlfix]
explicit_start = false
line_length = 88
preserve_quotes = true
section_whitelines = 1
whitelines = 1
