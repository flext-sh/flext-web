# [CUSTOM] project metadata
[project]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: Flask",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Topic :: Internet :: WWW/HTTP :: Dynamic Content",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = [
    "fastapi>=0.136.1",
    "flask>=3.1.3",
    "flext-cli @ git+https://github.com/flext-sh/flext-cli.git@0.12.0-dev",
    "flext-core @ git+https://github.com/flext-sh/flext-core.git@0.12.0-dev",
    "pydantic>=2.13.3",
    "pydantic-core>=2.46.3",
    "pydantic-settings>=2.14.0",
    "requests>=2.33.1",
    "uvicorn>=0.46.0",
]
description = "FLEXT Web - Modern Web Interface for FLEXT Platform"
keywords = [ "enterprise", "flask", "flext", "frontend", "typed", "web" ]
license = "MIT"
name = "flext-web"
readme = "README.md"
requires-python = ">=3.13,<3.14"
version = "0.12.0"

[[project.authors]]
email = "team@flext.sh"
name = "FLEXT Team"

[[project.maintainers]]
email = "team@flext.sh"
name = "FLEXT Team"

# [MANAGED] consolidated development dependencies
[project.scripts]
flext-web = "flext_web.__main__:main"

[project.urls]
Documentation = "https://github.com/flext-sh/flext/blob/main/README.md"
Homepage = "https://github.com/flext-sh/flext"

# [MANAGED] codespell

[tool.codespell]
check-filenames = true
ignore-words-list = "crate,nd"

# [MANAGED] coverage

[tool.coverage.report]
exclude_also = [ "if TYPE_CHECKING:", "if _t.TYPE_CHECKING:", "if typing.TYPE_CHECKING:" ]
fail_under = 25
precision = 2
show_missing = true
skip_covered = false

[tool.coverage.run]
omit = [ "*/dependency_injector/providers.pyx" ]

# [MANAGED] deptry

[tool.deptry]
known_first_party = [ "flext_cli", "flext_core", "flext_infra", "flext_tests", "flext_web" ]
pep621_dev_dependency_groups = [ "dev" ]

[tool.flext.docs]
project_class = "platform"


[tool.hatch.build.targets.sdist]
only-include = [ "src/flext_web" ]

[tool.hatch.build.targets.wheel]
packages = [ "src/flext_web" ]

[tool.hatch.metadata]
allow-direct-references = true

# [MANAGED] mypy

[tool.mypy]
# FLEXT mypy suppression rationale (validated at the facade-MRO boundary):
# FLEXT mypy[arg-type]: Public p.Result values widen only in Mypy; Pyright and Pyrefly retain T.
# FLEXT mypy[assignment]: Dependency-injector descriptors lose their MRO-bound type only in Mypy.
# FLEXT mypy[attr-defined]: PEP 562 facade members inherited through MRO are invisible to Mypy.
# FLEXT mypy[call-arg]: Pydantic v2 init signatures behind facade MRO are incomplete in Mypy.
# FLEXT mypy[misc]: Valid PEP 695 nested facade aliases are rejected under Mypy's misc bucket.
# FLEXT mypy[name-defined]: Generated PEP 562 exports are installed at runtime but absent to Mypy.
# FLEXT mypy[no-any-return]: Facade returns widen to Any only in Mypy; Pyright and Pyrefly resolve them.
# FLEXT mypy[no-redef]: Canonical c-t-p-m-u facades intentionally rebind their inherited short alias.
# FLEXT mypy[prop-decorator]: Mypy loses Pydantic computed-field descriptors across composed MRO.
# FLEXT mypy[type-var]: Mypy 1.20 drops T from inherited p.ResultLike; the direct owner passes.
# FLEXT mypy[unreachable]: Mypy over-narrows facade values and rejects live defensive guards.
# FLEXT mypy[valid-type]: Mypy rejects facade namespaces used as owners in valid PEP 695 aliases.
check_untyped_defs = true
disable_error_code = [
  "arg-type",
  "assignment",
  "attr-defined",
  "call-arg",
  "misc",
  "name-defined",
  "no-any-return",
  "no-redef",
  "prop-decorator",
  "type-var",
  "unreachable",
  "valid-type",
]
exclude = "^(?:tests|examples|legado)(?:/|$)"
explicit_package_bases = true
extra_checks = true
follow_imports = "normal"
ignore_missing_imports = true
local_partial_types = true
mypy_path = [ ".", "src" ]
namespace_packages = true
no_implicit_reexport = true
overrides = [  ]
plugins = [ "pydantic.mypy", "returns.contrib.mypy.returns_plugin" ]
python_version = "3.13"
strict_equality = true
warn_redundant_casts = true
warn_return_any = true
warn_unreachable = true
warn_unused_ignores = true

# [MANAGED] pydantic-mypy

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true

