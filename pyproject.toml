# [MANAGED] ruff
[tool.ruff]
exclude = [
  "**/__pyrefly_virtual__/**",
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "__pycache__",
  "archive",
  "backup",
  "build",
  "dist",
  "htmlcov",
  "legado",
  "temp-backup",
  "typings",
  "vendor",
  "venv",
]
fix = true
line-length = 88
namespace-packages = ["tests"]
preview = true
respect-gitignore = true
show-fixes = true
src = ["examples", "src", "tests"]
target-version = "py313"

[tool.ruff.format]
docstring-code-format = true
indent-style = "space"
line-ending = "lf"
quote-style = "double"
skip-magic-trailing-comma = true

[tool.ruff.lint]
# FLEXT Ruff suppression rationale (validated against semantic facet order):
# FLEXT ruff[import-outside-top-level]: Public facade models are imported lazily only at validation and construction sites to preserve the c-t-p-m-u graph and prevent runtime cycles.
# FLEXT ruff[unsorted-imports]: Ruff sorts TYPE_CHECKING imports lexically and reverses the mandatory semantic c-t-p-m-u dependency order in FLEXT facades.
ignore = [
  "ambiguous-unicode-character-comment",
  "ambiguous-unicode-character-docstring",
  "ambiguous-unicode-character-string",
  "assert-raises-exception",
  "bad-dunder-method-name",
  "bad-quotes-inline-string",
  "blank-line-with-whitespace",
  "blind-except",
  "boolean-positional-value-in-call",
  "camelcase-imported-as-lowercase",
  "collection-literal-concatenation",
  "commented-out-code",
  "complex-structure",
  "docstring-extraneous-exception",
  "docstring-extraneous-returns",
  "docstring-missing-exception",
  "docstring-missing-returns",
  "docstring-missing-yields",
  "get-attr-with-constant",
  "hardcoded-sql-expression",
  "incorrect-blank-line-before-class",
  "invalid-first-argument-name-for-method",
  "line-too-long",
  "logging-f-string",
  "missing-copyright-notice",
  "missing-return-type-private-function",
  "missing-trailing-comma",
  "mixed-case-variable-in-global-scope",
  "multi-line-summary-second-line",
  "no-self-use",
  "non-imperative-mood",
  "non-pep695-type-alias",
  "raise-vanilla-args",
  "raise-within-try",
  "redefined-loop-name",
  "set-attr-with-constant",
  "snake-case-type-alias",
  "too-many-arguments",
  "too-many-branches",
  "too-many-locals",
  "too-many-nested-blocks",
  "too-many-positional-arguments",
  "too-many-public-methods",
  "too-many-return-statements",
  "too-many-statements",
  "try-consider-else",
  "typing-only-first-party-import",
  "typing-only-standard-library-import",
  "typing-only-third-party-import",
  "undocumented-param",
  "unnecessary-lambda",
  "unnecessary-placeholder",
]
select = ["ALL"]

[tool.ruff.lint.flake8-tidy-imports.banned-api.argparse]
msg = "Use cli.register_result_command + Pydantic model from flext_cli."

[tool.ruff.lint.flake8-tidy-imports.banned-api.click]
msg = "Use flext_cli.cli application, registration, execution, and invocation methods."

[tool.ruff.lint.flake8-tidy-imports.banned-api.colorama]
msg = "Use cli.print with c.Cli.MessageStyles."

[tool.ruff.lint.flake8-tidy-imports.banned-api.getpass]
msg = "Use cli.prompt_password from flext_cli."

[tool.ruff.lint.flake8-tidy-imports.banned-api.orjson]
msg = "Use cli.json_read_file / cli.json_write_file / u.Cli.json_dumps from flext_cli."

[tool.ruff.lint.flake8-tidy-imports.banned-api.prompt_toolkit]
msg = "Use cli.prompt / cli.confirm / cli.prompt_choice / cli.prompt_password."

[tool.ruff.lint.flake8-tidy-imports.banned-api.rich]
msg = "Use cli.print / cli.display_message / cli.render_panel / cli.render_table."

[tool.ruff.lint.flake8-tidy-imports.banned-api.simplejson]
msg = "Use cli.json_read_file / cli.json_write_file / u.Cli.json_dumps."

[tool.ruff.lint.flake8-tidy-imports.banned-api.tabulate]
