# [MANAGED] FLEXT pyproject standardization
# Sections with [MANAGED] are enforced by flext_infra.deps.modernizer.
# Run `make mod` to regenerate all managed pyproject sections.
# Sections with [CUSTOM] are project-specific extension points.

# [MANAGED] build system
[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

[dependency-groups]
dev = [
  "types-flask (>=1.1.6,<2.0.0)",
]

# [CUSTOM] project metadata
[project]

authors = [ {email = "team@flext.sh", name = "FLEXT Team"} ]
classifiers = [
  "Development Status :: 4 - Beta",
  "Development Status :: 5 - Production/Stable",
  "Framework :: Flask",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Topic :: Internet :: WWW/HTTP :: Dynamic Content",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = [
  "fastapi>=0.119",
  "flask>=3",
  "flext-core",
  "pydantic-core>=2.41.4",
  "pydantic-settings>=2.11",
  "pydantic>=2.12.3",
  "requests>=2.31",
  "uvicorn>=0.38",
]
description = "FLEXT Web - Modern Web Interface for FLEXT Platform"
keywords = [ "enterprise", "flask", "flext", "frontend", "typed", "web" ]
license = "MIT"
maintainers = [ {email = "team@flext.sh", name = "FLEXT Team"} ]
name = "flext-web"
readme = "README.md"
requires-python = ">=3.13,<3.14"
scripts = {"flext-web" = "flext_web.__main__:main"}
urls = {Documentation = "https://github.com/flext-sh/flext/blob/main/README.md", Homepage = "https://github.com/flext-sh/flext"}
version = "0.12.0-dev"

# [MANAGED] consolidated development dependencies
[project.optional-dependencies]
dev = [
