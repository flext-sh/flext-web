        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Setup (blocking)
        run: make setup

      - name: Check (blocking)
        run: make check

      - name: Test (advisory)
        continue-on-error: true
        run: make test

      - name: Val (advisory)
        continue-on-error: true
        run: make val
